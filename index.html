<!DOCTYPE html>
<!--
  OpenPet 宠物窗口 —— 透明背景的桌面小猫。
  由 Electron 无边框透明窗口承载，视觉上小猫直接站在桌面上。
-->
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPet</title>
    <style>
        /* 全局 border-box 让宽高计算更直观，避免 padding 撑破透明窗口。 */
        * {
            box-sizing: border-box;
        }

        /* Electron 窗口本身是透明的，页面也必须保持透明背景才能露出桌面。 */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 页面只有一个桌面宠物，所以用 grid 把主容器铺满整个窗口。 */
        body {
            display: grid;
            place-items: center;
            font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* #pet 是拖拽、点击、右键菜单的事件承载层，尺寸等于整个 Electron 窗口。 */
        #pet {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.001);
            cursor: grab;
        }

        /* 拖拽时切换光标，给用户明确反馈。 */
        #pet.dragging {
            cursor: grabbing;
        }

        /*
           小猫帧动画通过 div + background-image + background-position-x 实现精灵图播放，
           不再使用 img src 替换，避免频繁触发图片解码。
           --cat-direction：水平翻转（1 或 -1），由 walk.js 控制。
        */
        #cat {
            --cat-direction: 1;
            --cat-scale: 1;
            position: absolute;
            left: 0;
            bottom: 0;
            background-repeat: no-repeat;
            background-size: auto 100%;
            background-position: left bottom;
            transform: scaleX(var(--cat-direction));
            transform-origin: center bottom;
            filter: drop-shadow(0 12px 14px rgba(0, 0, 0, 0.22));
            pointer-events: none;
        }

        /*
           自定义 cursor 用 DOM 图层绘制，而不是完全依赖系统 CSS cursor。
           透明 Electron 窗口下原生 cursor 在部分区域更新不稳定，DOM 图层更可控。
        */
        #custom-cursor-overlay {
            position: absolute;
            left: 0;
            top: 0;
            display: none;
            width: 48px;
            height: 48px;
            object-fit: contain;
            pointer-events: none;
            z-index: 20;
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        #custom-cursor-overlay.visible {
            display: block;
        }

        /* 气泡默认隐藏在小猫头顶，显示时通过 opacity 和 transform 做轻量过渡。 */
        #bubble {
            position: absolute;
            left: 50%;
            top: 18px;
            max-width: 180px;
            min-height: 32px;
            padding: 7px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            color: #2f2f2f;
            font-size: 13px;
            line-height: 18px;
            text-align: center;
            transform: translateX(-50%) translateY(-8px);
            opacity: 0;
            transition: opacity 160ms ease, transform 160ms ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
            pointer-events: none;
        }

        /* show 类由 bubble.js 临时添加，持续一段时间后自动移除。 */
        #bubble.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 右键菜单固定在窗口右下角，默认不占布局。 */
        #menu {
            position: absolute;
            right: 12px;
            bottom: 12px;
            display: none;
            min-width: 92px;
            padding: 6px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        /* 菜单打开时用 grid 排列按钮和分隔线。 */
        #menu.open {
            display: grid;
            gap: 4px;
        }

        /* 菜单按钮保持轻量样式，避免在小窗口里显得拥挤。 */
        #menu button {
            width: 100%;
            min-height: 30px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: #262626;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
        }

        /* 悬停反馈只改变背景，不改变尺寸，避免菜单抖动。 */
        #menu button:hover {
            background: rgba(0, 0, 0, 0.07);
        }

        /* 分隔动作按钮和固定控制按钮。 */
        #menu .divider {
            width: 100%;
            height: 1px;
            margin: 3px 0;
            background: rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>
    <!-- 主容器承载所有交互；aria-label 让辅助技术知道这是桌面小猫区域。 -->
    <main id="pet" aria-label="桌面小猫">
        <!-- 气泡由 bubble.js 写入文本并控制显示隐藏。 -->
        <div id="bubble"></div>

        <!-- 小猫帧动画使用 div + background-image 逐帧偏移播放。 -->
        <div id="cat"></div>

        <!-- 透明窗口下的可见自定义鼠标指针，由 renderer.js 跟随 pointer 坐标。 -->
        <img id="custom-cursor-overlay" alt="" aria-hidden="true">

        <!-- 右键菜单内容由 menu.js 根据 animations.json 动态生成。 -->
        <nav id="menu" aria-label="小猫菜单"></nav>
    </main>

    <script src="src/shared/cursor-style.js"></script>
    <script src="src/shared/pet-hitbox.js"></script>
    <!-- 渲染层入口，组装各模块并绑定事件、启动应用。 -->
    <script src="renderer.js"></script>
</body>
</html>
