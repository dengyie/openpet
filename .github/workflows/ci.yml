name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Control Center
        run: npm run build:control-center

      - name: Check audit
        run: npm audit

      - name: Generate sprites
        run: npm run generate-sprites

      - name: Check JavaScript syntax
        run: npm run check:syntax
