<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenPet Bubble Chat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="bubble-shell" id="bubble-shell">
      <div class="bubble-card">
        <header class="bubble-header">
          <span id="source-label">Pet</span>
          <div class="bubble-actions">
            <button type="button" id="pin-button" aria-pressed="false">定格</button>
            <button type="button" id="close-button" aria-label="关闭">×</button>
          </div>
        </header>
        <p id="message-text">...</p>
        <p class="last-user-message" id="last-user-message" hidden></p>
        <p class="error-message" id="error-message" hidden></p>
        <form class="mini-input-form" id="mini-input-form">
          <textarea id="mini-input" rows="1" placeholder="回复宠物..." aria-label="回复宠物"></textarea>
          <button type="submit" id="send-button">发送</button>
        </form>
      </div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
